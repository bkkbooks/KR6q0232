body:
  text: 嗣法門人性統編祝延增補朔望祝延讚寶鼎爇名香普遍十方虔誠奉獻法中王端為皇王祝聖壽地久天長南無香雲蓋菩薩三稱藥師如來藥師如來皇帝萬歲藥師如來大圓滿覺應跡西乾心包太虛量周沙界佛之聖德難盡讚揚入鄉貰住居傳靈山道脈幾十幾世婆伽沙門某率監院某恭遇某年某月某日朔旦之辰雲集闔堂禪衆登臨紺殿諷演咒章端為祝延今上皇帝聖躬萬歲萬歲再嵩呼萬萬歲東宮殿下睿算千秋文武官僚高增祿位伏願堯風永扇舜日長明八方歌有道之君四海樂無虞之化邊邦寧靖不聞鐵馬金戈年歲豐隆時見和風甘雨人人安堵物物含生更冀宗派常流祖燈不滅輝揚大地揭佛日於中天澤沛遐荒濬禪河於下土兩堂龍象道業增崇一帶檀那信心堅密法門光顯魔障潛消仰勞大衆同念金剛無量壽護國人王菩薩摩訶薩摩訶般若波羅蜜接薩怛由楞嚴咒增修祝韋馱諷天女咒三遍南無護法韋馱尊天菩薩三稱威靈叵測密行難思示現童身修成一百七十世莊嚴寶杵拿定八萬四千斤受遺囑而輔正除邪廣神通而安僧護法仰希洞鑒俯賜昭垂入鄉貫同前雲集闔堂禪衆登臨寶所諷演紀章專伸祈禱南無三洲感應護法韋馱尊天菩薩侍從天等切念末法僧行道力衰微障業潛滋類浮雲之蔽日根塵暗糾似野馬以奔埃正眼未開妄情多熾惟冀菩薩普眼鑒觀慈衷默祐蠲除夙障箇箇遊普賢行門啓迪靈根人人悟毗盧性海俗真利益賓主安和讚韋馱天將菩薩化身三洲感應誓弘深寶杵鎮魔軍功德難名祈禱赴凡情南無普眼菩薩摩訶薩摩訶般若波羅蜜增修祝伽藍諷功德寶山神咒二遍南無伽藍聖衆菩薩三稱冥威凜凜聖德巍巍長為護法之神永作伽藍之主無微不格有感必通爰集禪流專伸禱告當山上地一十八位護法伽藍神王菩薩願力弘深悲心廣大靈山受囑同來護法安僧華藏期登不厭積功纍德仰冀真宰普降鴻慈感有力之檀那化緣廣布去無端之橫擾法席常寧內外咸安障魔頓息讚伽藍聖衆護法為心光明正大破群陰非橫總無侵四衆同欽萬古鎮叢林南無常擁護菩薩摩訶薩摩訶般若波羅蜜增修祝祖師諷心經一遍南無歷代祖師菩薩三稱圓明性海消生死起滅之波大寂定門絶今古去來之路慈航倒駕祖印高提敬集雲仍焚檀仰祝西天東土歷代祖師四七高僧竺國曾經直指二三祖禰支那得荷單傳一個破沙盆齊齊扶起半條斷貫索歷歷穿來鼻孔都直一般面目更非兩樣全拋心印普駕慈舟伏願宗派長流真風永扇千江片月冰輪朗映於無邊萬室一燈薪火輝揚於不盡共立腰間紅雪長開指上青蓮讚西來祖脈直指單傳一花開遍五枝聯授受絶言詮應禱隨緣如月印江天南無度人師菩薩摩訶薩摩訶薩般若波羅蜜增修祝監齊諷準提咒二遍南無監齊使者菩薩三稱法筵廣布神功默運雲廚妙供頻陳聖力潛培香積薦三尊而無缺飯萬衆以咸調虔集禪流特伸告親監齊使者大聖緊那羅王菩薩潔清惟志饒益為心供應僧伽一日鉢盂兩度濕化行檀度二時粥飯萬家緣珍饈廣勝於祇園法喜長資於禪悅聖凡普供早暮咸資讚監齊使者轄鎮香廚焦頭爛額悉皆無六味化醍醐聖力劻扶法會協中孚南無焰慧地菩薩摩訶薩摩訶般若波羅蜜補囑孤魂諷心經一遍南無悲臻大士菩薩三稱荒丘月冷野壑雲橫滯魄未脫於寒林冥魂尚沉夫苦爽超升罔自濟拔何由咨爾甶子孤魂聽豫叮嚀告囑蓋聞心佛衆生等無差別詎知人天鬼趣卻有殊途良由纍世之沉淪未解一乘之妙道生迷三毒恆汩沒於苦海愛河死喫千酸自陷溺於銅城鐵網利名安在恩怨胡存乘茲禪制之期速發菩提之願多生幻夢都隨玉板敲回歷劫空花統自金鐘擊碎諸佛名字常歷耳根最上道場遍經腳底從此悟無生面目於焉登極樂蓮邦同作皈依各須諦聽讚孤魂甶子無主無依三途六道苦凄凄正法未聞知靜聽玄機頓脫苦泥犁南無生天界菩薩摩訶薩摩訶般若波羅蜜補元旦藥師如來藥師如來皇帝萬歲藥師如來元和初啓歲曆維新雲堂傳爆竹之聲雪嶺破梅花之面佳辰堪羡聖德宜揚入鄉貫同前伏願乾綱獨握泰運弘開仁風廣播於寰中化日長舒於宇內當陽出治法行健以同天繼位臨民資乾元而首物人人稱萬年天子歲歲紀正月春王更冀德被祗園道尊佛化不征不擾使野人樂泉石之安為友為師偕道者講無為之學禪風大暢治化彌隆仰勞云云補上元藥師如來藥師如來皇帝萬歲藥師如來福星朗耀元運弘開銀花燦爛於中天火樹輝煌於午夜祥光普映景福頻彰入鄉貫同前伏願位隆乾極德配離明體元善以長人四海樂陽春之有腳洽重熙而昭化萬邦仰光被於無窮乃知賜福不止於天官故爾歡騰宜伸於佳節更冀齊心奉佛潔志明宗求酬價於師僧襆頭自頂門整起示積錢於輔弼明珠從掌上輪來庶重道在乎一人而薰修遍於四野叢林寢盛法席常安仰勞大衆云云補中元藥師如來藥師如來皇帝萬歲藥師如來金風乍轉木葉初騰碧梧驚墜於寒林玉露漸摧夫衰草因時懷感觸物興思入鄉貫同前伏願聖文克著神武維揚萬方凜不殺之威六宇奉無刑之化湯仁解綱允矣再見今朝舜德好生洵哉重逢此日歡歌騰於垂姓絲綸降白九天更冀衷等佛慈量同空納弘開蓮社年年飛野鶴孤雲席廣精藍在在聞晨鐘暮鼓俾鉗錘設處使先知而覺後知庶鞀鐸懸時令後覺而承先覺八方風動四野雲從仰勞大衆云云補下元藥師如來藥師如來皇帝萬歲藥師如來槐楠甫改霜雪頻仍倏爾春動小陽胡焉冬臨大冶厄由斯解慶自此生入鄉貫同前伏願恩波浩蕩膏澤滂流己溺己饑每切吉凶而同患欲立欲達恆資化育以均調庶樂利在於域中而聖明尊乎天上痌瘝俱釋雲日齊瞻更冀德邁冬官令傳北陸紅爐火熟毋論江以南江以北許令猊座常敷白雪風飄不拘山之西山之東聽其獅音大震利備檀施行力功銘鹿苑雞園雲水增輝林泉生色仰勞大衆云云補祝佛誕釋迦如來釋迦如來皇帝萬歲釋迦如來朱明司令赤帝乘權澤品物以光流彙群儀而嘉會時當聖誕禮合揚言入鄉貫同前伏願弘仁普洽至德咸孚乘六龍以御天秉一中而作則齊而治治而平繕修本於一己庶則富富則教撫綏暨乎萬邦更冀道合無言德純不顯獨稱尊於人間天上宛同維衛之降靈或問道於林下水邊多布祗園而攝化方隅鎮靜雲鶴無憂仰勞大衆云云補佛成道釋迦如來釋迦如來皇帝萬歲釋迦如來寒梅驚放瑞雪橫飄枝頭喜見天心嶺畔潛通造化陽回年臘運轉餘冬入鄉貫同前伏願治隆朝野道合君臣主聖臣良千載仰都會之盛民安國泰四方樂平治之休盡率土而興讓興仁舉普天而修善修福更冀佛心常在悲願不忘苦行無煩六年睹星止須半夜雲丘野寺都盧視作雪山破衲單瓢俱爾看如悉達個個發奇哉三嘆人人開正眼一雙大衍禪風洞明宗旨仰勞大衆云云補祝堂頭和尚誕期藥師如來藥師如來皇帝萬歲藥師如來檀煙縹眇燭影爃煌床頭殘夢初回殿角曉鐘剛罷兩堂鴛列一衆葵傾入鄉貫監院名伏願功高位育念切安懷等日月之照臨方隅向化同乾坤之覆載民物含膏盡曲成而無遺統範圍以不過再冀堂頭和尚菩薩應世祖佛承宗以常住之身昭無住之體展無生之面示有生之倫桃有榮椒有榮三世宗親悉歡會於東公西母山無量海無量十方龍象恆瞻祝乎北斗南辰壽福彌天光明映日仰勞大衆云云補祝檀信誕期藥師如來藥師如來皇帝萬歲藥師如來碧桃染醉仙李凝香山前濬菊水之波殿上繞松陰之色光聯北斗瑞靄南辰入鄉貫同前伏願衷孚九有德合三無群倫推首出之尊萬國仰咸寧之化正以義育以仁處處秉溫秋肅瞻如雲就如日人人歌帝德皇風既不愆不泄不忘自而又而康而壽更冀誕生檀越時烹在髓嘆椒花三留給孤長者長住人間一衆歡瞻三生大衆云云增補掛鐘板語執事至板位前喝一喝云金鐘韻響玉板聲傳震開那畔機關透出個中消息鬼神莫覷佛祖難窺從今揭示堂前用表叢林軌則伏願希音遠播清籟時宣俾令聽者聞者聲聲得自何來更使敲者擊者下下尋知落處分明不昧到處圓通復喝一喝讚法筵肇起選佛場開金鐘玉板響如雷元韻自天來聲遍九垓內外絶塵埃南無功德林菩薩摩訶薩摩訶般若波羅蜜增補摘鐘板語執事至板位前合掌問訊云這二老煩他多時金鐘玉振高懸佛事門頭響寂聲沉歸結威音成始成終幸爾期周圓且教一齊教不如放下一句合作麼生堂前不必多拈弄但許知音側耳聽讚聲沉響寂暗裡傳希終始絶言詮敲擊捐撒手到長南無圓滿藏菩薩摩訶薩摩訶般若波羅蜜增補檀信祈禍白意容瞻妙相座列華壇銀床燭走金蛇玉鼎香飛白鶴葵心傾赤紺目垂青入鄉貫某竊念勞形傳舍寄跡蘧廬苦三業之未除念四恩之罔報名韁利鎖幾回打斷難開苦海愛河卓爾踴身欲渡爰遵佛化敬竭凡私伏願廣設慈航弘施寶筏接引舒金臂平生沉溺借提攜鑑察展蓮眸此目肫誠憑洞矚貝葉翻而新禧頻集琅函啓而夙障永清撥開一路迷雲傾出滿空花雨某無任激切懇到之至謹意附寄名禳關意聖德含弘萬靈咸資於化育法門廣大二諦總借夫栽培但屬皈依之倫俱荷生成之澤敬竭凡悃于真聰某言念多生積垢現世招愆血食關心冀創垂之有托箕裘係念期繼述以重光幸得孺子之擎歡竊恐關星之未順今將某子寄入空門同圓頂而方亦更名而異服伏願慈衷昭被悲智鑒觀憫黃口之嬰兒長效庭前戲彩祐嚶啞之孩赤永為膝下斑衣福星朗耀於中天壽城弘開於紫極椒花協瑞桃實敷榮某無任激切肫懇之至謹意附寄名脫白意真俗同原為歸真而顯俗佛生不二因仗佛而護生庶類咸被慈光群倫總依悲念靈通感應德洽中孚某言念塵情擾擾世事紜紜無奈何哉日紛馳於俗纍最喫緊者時係念於箕裘曾以索之男投禮至尊之座叨蒙庇祐已度沖齡值茲稍長之年漸當成立之候炳然寶炬敬設齊筵傾葵赤而達蓮臺冀青眸之永盻竭凡衷而薦葑菲期紺目以遙觀昔緣無名而寄名今則告白而脫白伏願金雞放赦彩鳳銜丹一面網開捨釋子還為我子三生緣熟保嬰兒長作吾兒慶瓜瓞之綿延仰栽培於高厚晨昏稱意早夜快心某無任激切肫懇之至謹意附檀信諷經白意萬德嚴身示皈依之有相三乘演教見濟度之無窮竭凡忱而仰叩佛慈滌塵襟而敬宣法化求則斯應感而遂通某為因某事就於某處諷誦某經幾部以此微因上干聖造伏願慈衷降格聖智昭臨鑒此誠燭肺肝而如見納茲懇款俾心緒以潛通隨信之敷陳冀慈悲而攝受為祥為慶釋過釋愆某無任激切屏營之至謹意附檀信諷經畢白意貝葉靈文字字宣時花雨落琅函祕典行行演處法雲垂既雪罪而消愆且增榮而錫祉資為寶筏統作皈依某為因某事就於某處諷誦某經幾部茲當告竟再叩蓮臺伏願白毫舒采紺目垂青簡片念之真誠昭格因乎禱祝鑒寸衷之肫摯福祐賜以禎祥傳長稚以咸安合庭除而胥慶事祈戩穀理應降康某無任激切屏營之至謹意
