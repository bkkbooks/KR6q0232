body:
  text: 高峰三山來禪師疏語目次卷上元旦表上元表中元表下元表慶佛誕表佛成道表結制進表解制謝表二解制意二懺期表諷華嚴經表二諷法華經表禮梁皇懺表然天燭意建盂蘭會意二建盂蘭會表諷藥師經表諷金剛經表進彌陀佛表慶觀音誕表進地藏表卷中文昌表祝聖帝表韋馱表瑜伽表修因表酬願表填還寄庫表燃天燭表祈禱平安意懺經意悔過修因意賑濟孤意利幽意彌陀會意薦師弟意禳虎意祈雨意二薦師弟意表盤米意禳蟲蝗意請水意寄名禳關意釋子修因表卷下朔望祝延增修祝韋馱增修祝伽藍增修祝祖師增修祝監齋補囑孤魂補元旦補上元補中元補下元補祝佛誕補佛成道補祝堂頭誕期補祝檀信誕期增補掛鐘板語增補摘鐘板語附補檀信祈福白意寄名禳關意寄名脫白意檀信諷經白意檀信諷經畢白意
